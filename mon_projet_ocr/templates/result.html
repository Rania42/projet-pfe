<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat - Scanner Bancaire</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 600px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .status-icon {
            width: 48px;
            height: 48px;
            background: #dcfce7;
            color: #16a34a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }

        .header p {
            color: #64748b;
            font-size: 0.9rem;
        }

        .result-section {
            margin-bottom: 1.5rem;
        }

        .result-section:last-of-type {
            margin-bottom: 2rem;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            margin-bottom: 0.5rem;
        }

        .value {
            font-size: 1.125rem;
            color: #1e293b;
            font-weight: 500;
        }

        .tag {
            display: inline-block;
            background: #1e293b;
            color: white;
            padding: 0.375rem 0.875rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .text-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .text-box pre {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #334155;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: #1e293b;
            color: white;
        }

        .btn-primary:hover {
            background: #334155;
        }

        .btn-secondary {
            background: white;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #f8fafc;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
            
            .actions {
                flex-direction: column;
            }
        }

        @media print {
            .actions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="status-icon">✓</div>
            <h1>Analyse terminée</h1>
            <p>Document classifié avec succès</p>
        </div>

        <div class="result-section">
            <div class="label">Famille</div>
            <div class="value">
                <span class="tag">{{ family }}</span>
            </div>
        </div>

        <div class="result-section">
            <div class="label">Type de document</div>
            <div class="value">{{ type }}</div>
        </div>

        <div class="result-section">
            <div class="label">Contenu extrait</div>
            <div class="text-box">
                <pre>{{ text }}</pre>
            </div>
        </div>

        <div class="actions">
            <a href="/" class="btn btn-primary">Nouvelle analyse</a>
            <button class="btn btn-secondary" onclick="window.print()">Imprimer</button>
        </div>
    </div>
</body>
</html>
